<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" width="760" height="280">
  <title>newton-cli architecture</title>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#8b949e"/>
    </marker>
  </defs>
  <rect width="760" height="280" rx="10" fill="#0d1117"/>

  <!-- Row 1: Agent -->
  <rect x="30" y="30" width="130" height="44" rx="8" fill="#1f2937" stroke="#76B900" stroke-width="1.5"/>
  <text x="95" y="57" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#76B900">AI Agent</text>

  <!-- Arrow down to Route A -->
  <line x1="95" y1="74" x2="95" y2="100" stroke="#8b949e" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Row 2: Two routes side by side -->
  <!-- Route A -->
  <rect x="30" y="105" width="220" height="60" rx="8" fill="#1f2937" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="128" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#3b82f6">Route A: recipe.json</text>
  <text x="140" y="148" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">model build + sim run + render</text>
  <text x="140" y="160" text-anchor="middle" font-family="monospace" font-size="10" fill="#3b82f6">25 examples</text>

  <!-- Route B -->
  <rect x="280" y="105" width="220" height="60" rx="8" fill="#1f2937" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="390" y="128" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#f59e0b">Route B: run-script</text>
  <text x="390" y="148" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">subprocess + artifacts</text>
  <text x="390" y="160" text-anchor="middle" font-family="monospace" font-size="10" fill="#f59e0b">33 examples</text>

  <!-- Arrow Agent to Route B -->
  <path d="M160,52 L390,52 L390,100" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Row 3: Newton engine (centered) -->
  <rect x="530" y="105" width="200" height="60" rx="8" fill="#1f2937" stroke="#76B900" stroke-width="1.5"/>
  <text x="630" y="128" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#76B900">NVIDIA Newton</text>
  <text x="630" y="148" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">GPU physics (Warp)</text>
  <text x="630" y="160" text-anchor="middle" font-family="monospace" font-size="10" fill="#76B900">7 solvers</text>

  <!-- Arrows routes -> Newton -->
  <line x1="250" y1="135" x2="525" y2="135" stroke="#8b949e" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="500" y1="135" x2="525" y2="135" stroke="#8b949e" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Row 4: Outputs -->
  <rect x="30" y="200" width="160" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="110" y="222" text-anchor="middle" font-family="monospace" font-size="12" fill="#c9d1d9">state.npz</text>
  <text x="110" y="240" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">body_q, particle_q, ...</text>

  <rect x="210" y="200" width="160" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="290" y="222" text-anchor="middle" font-family="monospace" font-size="12" fill="#c9d1d9">render.png</text>
  <text x="290" y="240" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">headless OpenGL</text>

  <rect x="390" y="200" width="160" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="470" y="222" text-anchor="middle" font-family="monospace" font-size="12" fill="#c9d1d9">--json stdout</text>
  <text x="470" y="240" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">structured envelope</text>

  <!-- Arrow Newton -> outputs -->
  <path d="M630,165 L630,185 L290,185 L290,195" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="110" y1="185" x2="110" y2="195" stroke="#8b949e" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="470" y1="185" x2="470" y2="195" stroke="#8b949e" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- 58/65 badge -->
  <rect x="600" y="210" width="120" height="30" rx="15" fill="#238636"/>
  <text x="660" y="230" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#fff">58 / 65</text>
</svg>
