<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 180" width="820" height="180">
  <title>newton-cli</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="820" height="180" rx="12" fill="url(#bg)"/>

  <!-- Falling particles motif (right side) -->
  <circle cx="620" cy="30" r="8" fill="#76B900" opacity="0.9"/>
  <circle cx="655" cy="22" r="5" fill="#76B900" opacity="0.7"/>
  <circle cx="690" cy="40" r="6" fill="#76B900" opacity="0.8"/>
  <circle cx="640" cy="55" r="4" fill="#76B900" opacity="0.6"/>
  <circle cx="720" cy="35" r="7" fill="#76B900" opacity="0.5"/>
  <circle cx="670" cy="70" r="5" fill="#76B900" opacity="0.7"/>
  <circle cx="750" cy="50" r="4" fill="#76B900" opacity="0.4"/>
  <circle cx="700" cy="80" r="6" fill="#76B900" opacity="0.6"/>
  <circle cx="730" cy="95" r="3" fill="#76B900" opacity="0.5"/>
  <circle cx="660" cy="100" r="4" fill="#76B900" opacity="0.4"/>
  <circle cx="745" cy="115" r="5" fill="#76B900" opacity="0.3"/>

  <!-- Dotted trajectory lines -->
  <line x1="620" y1="40" x2="620" y2="140" stroke="#76B900" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.3"/>
  <line x1="690" y1="48" x2="695" y2="140" stroke="#76B900" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.25"/>
  <line x1="750" y1="58" x2="745" y2="140" stroke="#76B900" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.2"/>

  <!-- Ground line -->
  <line x1="600" y1="142" x2="780" y2="142" stroke="#76B900" stroke-width="2" opacity="0.35"/>

  <!-- Settled particles -->
  <circle cx="615" cy="138" r="5" fill="#76B900" opacity="0.7"/>
  <circle cx="640" cy="138" r="6" fill="#76B900" opacity="0.6"/>
  <circle cx="670" cy="138" r="4" fill="#76B900" opacity="0.8"/>
  <circle cx="695" cy="138" r="7" fill="#76B900" opacity="0.5"/>
  <circle cx="725" cy="138" r="5" fill="#76B900" opacity="0.7"/>
  <circle cx="750" cy="138" r="4" fill="#76B900" opacity="0.6"/>
</svg>
